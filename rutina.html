<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Rutinas | Fit Push</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #caff33;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-light: #f5f5f5;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            padding-bottom: 80px; /* Espacio para el timer flotante */
        }

        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        .btn-neon {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-neon:hover {
            background-color: #b3e600;
            transform: scale(1.05);
        }

        /* Cards de Rutina */
        .day-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
        }
        .day-card:hover {
            border-color: var(--primary-color);
        }
        
        .active-exercise {
            border-left: 4px solid var(--primary-color);
            background-color: #252525;
        }

        /* Timer Flotante */
        #sticky-timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #000;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(202, 255, 51, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-black mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-arrow-left me-2"></i> VOLVER A FIT PUSH</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="setup-section" class="py-5 text-center">
            <h1 class="display-4 mb-4">DISEÑA TU <span style="color:var(--primary-color)">ESTRATEGIA</span></h1>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark border-secondary p-4">
                        <div class="mb-4 text-start">
                            <label class="form-label text-white">¿Cuántos días puedes entrenar?</label>
                            <select id="daysInput" class="form-select bg-black text-light border-secondary">
                                <option value="3">3 Días (Full Body)</option>
                                <option value="4">4 Días (Torso / Pierna)</option>
                                <option value="5">5 Días (Frecuencia Híbrida)</option>
                            </select>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label text-white">Tiempo disponible por sesión</label>
                            <select id="timeInput" class="form-select bg-black text-light border-secondary">
                                <option value="30">30 Minutos (Express)</option>
                                <option value="60" selected>60 Minutos (Estándar)</option>
                                <option value="90">90 Minutos (Volumen Alto)</option>
                            </select>
                        </div>
                        <button class="btn btn-neon w-100 py-3" onclick="generateRoutine()">GENERAR RUTINA AHORA</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="weekly-view" class="d-none animate-fade">
            <h2 class="mb-4">TU PLAN SEMANAL</h2>
            <div class="row g-4" id="week-container">
                </div>
            <div class="text-center mt-4">
                <button class="btn btn-outline-secondary" onclick="resetApp()">Cambiar configuración</button>
            </div>
        </section>

        <section id="workout-mode" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="active-day-title">ENTRENAMIENTO DE HOY</h2>
                <button class="btn btn-sm btn-outline-danger" onclick="closeWorkout()">Finalizar</button>
            </div>

            <div class="progress mb-4" style="height: 5px; background-color: #333;">
                <div class="progress-bar" role="progressbar" style="width: 0%; background-color: var(--primary-color);" id="workout-progress"></div>
            </div>

            <div id="exercise-list">
                </div>
        </section>

    </div>

    <div id="sticky-timer" onclick="toggleTimer()">
        <i class="fas fa-stopwatch me-2"></i> <span id="timer-display">00:00</span>
    </div>

    <script>
        // --- BASE DE DATOS MOCKUP (Simulación) ---
        // En un proyecto real de DAM, esto vendría de un JSON o una API.
        const routineDB = {
            3: [ // 3 Días - Full Body
                { day: "Lunes", focus: "Cuerpo Completo A", exercises: ["Sentadilla Trasera", "Press de Banca", "Remo con Barra", "Plancha Abdominal"] },
                { day: "Miércoles", focus: "Cuerpo Completo B", exercises: ["Peso Muerto", "Press Militar", "Dominadas", "Curl de Bíceps"] },
                { day: "Viernes", focus: "Cuerpo Completo C", exercises: ["Prensa de Piernas", "Fondos en Paralelas", "Jalón al Pecho", "Extensiones Tríceps"] }
            ],
            4: [ // 4 Días - Torso / Pierna
                { day: "Lunes", focus: "Torso Fuerza", exercises: ["Press de Banca", "Remo Pendlay", "Press Militar", "Dominadas"] },
                { day: "Martes", focus: "Pierna Fuerza", exercises: ["Sentadilla Trasera", "Peso Muerto Rumano", "Prensa", "Gemelos"] },
                { day: "Jueves", focus: "Torso Hipertrofia", exercises: ["Press Inclinado", "Jalón al Pecho", "Elevaciones Laterales", "Curl Martillo"] },
                { day: "Viernes", focus: "Pierna Hipertrofia", exercises: ["Sentadilla Búlgara", "Hip Thrust", "Extensiones Cuádriceps", "Curl Femoral"] }
            ],
            5: [ // 5 Días - PPL (Push Pull Legs)
                { day: "Lunes", focus: "Empuje (Push)", exercises: ["Press de Banca", "Press Militar", "Fondos", "Extensiones Tríceps"] },
                { day: "Martes", focus: "Tracción (Pull)", exercises: ["Peso Muerto", "Dominadas", "Remo Gironda", "Curl con Barra"] },
                { day: "Miércoles", focus: "Pierna (Legs)", exercises: ["Sentadilla Trasera", "Prensa", "Zancadas", "Elevación de Gemelos"] },
                { day: "Jueves", focus: "Torso", exercises: ["Press Inclinado", "Remo con Mancuerna", "Elevaciones Laterales", "Facepull"] },
                { day: "Viernes", focus: "Brazos / Auxiliar", exercises: ["Curl Predicador", "Press Francés", "Abdominales", "Cardio HIIt"] }
            ]
        };

        let currentPlan = [];
        let timerInterval;
        let timeLeft = 0;

        // --- LÓGICA PRINCIPAL ---

        function generateRoutine() {
            const days = document.getElementById('daysInput').value;
            currentPlan = routineDB[days];
            
            // Ocultar setup, mostrar semana
            document.getElementById('setup-section').classList.add('d-none');
            document.getElementById('weekly-view').classList.remove('d-none');
            
            renderWeek();
        }

        function renderWeek() {
            const container = document.getElementById('week-container');
            container.innerHTML = '';

            currentPlan.forEach((session, index) => {
                const card = `
                    <div class="col-md-4">
                        <div class="card day-card p-4 h-100">
                            <h4 style="color:var(--primary-color)">${session.day}</h4>
                            <h6 class="text-white mb-3">${session.focus}</h6>
                            <ul class="list-unstyled text-secondary small mb-4">
                                ${session.exercises.map(ex => `<li>• ${ex}</li>`).join('')}
                            </ul>
                            <button class="btn btn-outline-light btn-sm w-100 mt-auto" onclick="startWorkout(${index})">
                                EMPEZAR SESIÓN <i class="fas fa-play ms-2"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function startWorkout(index) {
            const session = currentPlan[index];
            document.getElementById('weekly-view').classList.add('d-none');
            document.getElementById('workout-mode').classList.remove('d-none');
            document.getElementById('active-day-title').innerText = session.day.toUpperCase() + ": " + session.focus;

            const list = document.getElementById('exercise-list');
            list.innerHTML = '';

            session.exercises.forEach((ex, i) => {
                list.innerHTML += `
                    <div class="card bg-dark border-secondary mb-3">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-0 text-white">${ex}</h5>
                                <small class="text-secondary">4 Series x 10-12 Reps</small>
                            </div>
                            <button class="btn btn-sm btn-neon" onclick="activateTimer(60)">
                                <i class="fas fa-stopwatch"></i> Descanso 60s
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function closeWorkout() {
            document.getElementById('workout-mode').classList.add('d-none');
            document.getElementById('weekly-view').classList.remove('d-none');
            stopTimer();
        }

        function resetApp() {
            document.getElementById('weekly-view').classList.add('d-none');
            document.getElementById('setup-section').classList.remove('d-none');
        }

        // --- LÓGICA DEL TIMER ---

        function activateTimer(seconds) {
            const timerDiv = document.getElementById('sticky-timer');
            const display = document.getElementById('timer-display');
            
            clearInterval(timerInterval);
            timeLeft = seconds;
            timerDiv.style.display = 'block';
            
            updateDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Efecto visual al terminar (parpadeo)
                    timerDiv.style.borderColor = 'red';
                    setTimeout(() => {
                         timerDiv.style.display = 'none';
                         timerDiv.style.borderColor = 'var(--primary-color)';
                    }, 2000);
                    alert("¡Tiempo de descanso terminado! A darle duro."); // Simple alerta, puedes mejorarla con audio
                }
            }, 1000);
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('sticky-timer').style.display = 'none';
        }
    </script>
</body>
</html>
