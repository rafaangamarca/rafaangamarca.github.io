<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Macros | Fit Push</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #caff33;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-light: #f5f5f5;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            padding-top: 80px;
        }

        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        .navbar { background-color: rgba(0,0,0,0.95) !important; border-bottom: 1px solid #333; }
        .navbar-brand { color: var(--primary-color) !important; font-weight: bold; }

        .calc-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-label { color: var(--primary-color); font-weight: bold; font-family: 'Oswald'; }
        
        .form-control, .form-select {
            background-color: #252525;
            border: 1px solid #444;
            color: white;
        }

        .form-control:focus, .form-select:focus {
            background-color: #252525;
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(202, 255, 51, 0.25);
        }

        .btn-neon {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            border: none;
            width: 100%;
            padding: 12px;
            text-transform: uppercase;
        }

        .result-box {
            display: none;
            margin-top: 30px;
            border-top: 2px solid var(--primary-color);
            padding-top: 20px;
        }

        .macro-badge {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            background: #252525;
            border: 1px solid #444;
        }

        .macro-val { color: var(--primary-color); font-size: 1.5rem; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-dumbbell"></i> FIT PUSH</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="calc-card">
                    <h2 class="text-center mb-4">Calculadora Nutricional</h2>
                    <form id="macroForm">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Género</label>
                                <select class="form-select" id="gender">
                                    <option value="male">Hombre</option>
                                    <option value="female">Mujer</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Edad</label>
                                <input type="number" class="form-control" id="age" placeholder="Ej: 25" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Peso (kg)</label>
                                <input type="number" class="form-control" id="weight" placeholder="Ej: 75" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Altura (cm)</label>
                                <input type="number" class="form-control" id="height" placeholder="Ej: 175" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Nivel de Actividad</label>
                                <select class="form-select" id="activity">
                                    <option value="1.2">Sedentario (Oficina / Sin ejercicio)</option>
                                    <option value="1.375">Ligero (Ejercicio 1-3 días/sem)</option>
                                    <option value="1.55">Moderado (Ejercicio 3-5 días/sem)</option>
                                    <option value="1.725">Fuerte (Ejercicio 6-7 días/sem)</option>
                                    <option value="1.9">Atleta (2h+ de entreno diario)</option>
                                </select>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-neon">Calcular Macros</button>
                            </div>
                        </div>
                    </form>

                    <div id="result" class="result-box">
                        <h3 class="text-center mb-4">Tu Plan Diario</h3>
                        <div class="text-center mb-4">
                            <span class="text-secondary">Calorías de Mantenimiento</span>
                            <h2 id="totalCalories" style="color: var(--primary-color);">2500 kcal</h2>
                        </div>
                        <div class="row g-2">
                            <div class="col-4">
                                <div class="macro-badge">
                                    <span class="small text-secondary">Proteína</span>
                                    <span id="prot" class="macro-val">150g</span>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="macro-badge">
                                    <span class="small text-secondary">Grasas</span>
                                    <span id="fat" class="macro-val">70g</span>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="macro-badge">
                                    <span class="small text-secondary">Carbs</span>
                                    <span id="carb" class="macro-val">300g</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('macroForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Obtener valores
            const gender = document.getElementById('gender').value;
            const age = parseFloat(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const activity = parseFloat(document.getElementById('activity').value);

            // Fórmula Mifflin-St Jeor
            let tmb;
            if (gender === 'male') {
                tmb = (10 * weight) + (6.25 * height) - (5 * age) + 5;
            } else {
                tmb = (10 * weight) + (6.25 * height) - (5 * age) - 161;
            }

            const mantenimiento = tmb * activity;

            // Reparto de Macros (Estándar fitness: 2g prot/kg, 1g grasa/kg, resto carbs)
            const p = weight * 2;
            const g = weight * 1;
            const c = (mantenimiento - (p * 4) - (g * 9)) / 4;

            // Mostrar resultados
            document.getElementById('totalCalories').innerText = Math.round(mantenimiento) + " kcal";
            document.getElementById('prot').innerText = Math.round(p) + "g";
            document.getElementById('fat').innerText = Math.round(g) + "g";
            document.getElementById('carb').innerText = Math.round(c) + "g";

            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
